<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Catppuccin Macchiato gradient background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#24273a"/>
      <stop offset="100%" stop-color="#1e2030"/>
    </linearGradient>
    <!-- Mauve to lavender glow -->
    <radialGradient id="glow" cx="0.5" cy="0.45" r="0.5">
      <stop offset="0%" stop-color="#c6a0f6" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#c6a0f6" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#c6a0f6" stop-opacity="0"/>
    </radialGradient>
    <!-- Y letter gradient -->
    <linearGradient id="ygrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c6a0f6"/>
      <stop offset="50%" stop-color="#b7bdf8"/>
      <stop offset="100%" stop-color="#8aadf4"/>
    </linearGradient>
    <!-- Subtle dot pattern for retro touch -->
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="1" fill="#cad3f5" opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Background: rounded square -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>

  <!-- Dot pattern overlay (subtle retro grid) -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="url(#dots)"/>

  <!-- Central glow -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="url(#glow)"/>

  <!-- Decorative neural/circuit lines (very subtle) -->
  <!-- Top-left cluster -->
  <circle cx="200" cy="220" r="3" fill="#8aadf4" opacity="0.2"/>
  <circle cx="240" cy="180" r="2" fill="#b7bdf8" opacity="0.15"/>
  <line x1="200" y1="220" x2="240" y2="180" stroke="#8aadf4" stroke-width="1" opacity="0.1"/>
  <circle cx="170" cy="260" r="2" fill="#8aadf4" opacity="0.12"/>
  <line x1="200" y1="220" x2="170" y2="260" stroke="#8aadf4" stroke-width="1" opacity="0.08"/>

  <!-- Top-right cluster -->
  <circle cx="824" cy="200" r="3" fill="#c6a0f6" opacity="0.2"/>
  <circle cx="860" cy="240" r="2" fill="#c6a0f6" opacity="0.12"/>
  <line x1="824" y1="200" x2="860" y2="240" stroke="#c6a0f6" stroke-width="1" opacity="0.1"/>
  <circle cx="790" cy="170" r="2" fill="#b7bdf8" opacity="0.15"/>
  <line x1="824" y1="200" x2="790" y2="170" stroke="#b7bdf8" stroke-width="1" opacity="0.08"/>

  <!-- Bottom-left cluster -->
  <circle cx="180" cy="780" r="2.5" fill="#8bd5ca" opacity="0.15"/>
  <circle cx="220" cy="810" r="2" fill="#8bd5ca" opacity="0.1"/>
  <line x1="180" y1="780" x2="220" y2="810" stroke="#8bd5ca" stroke-width="1" opacity="0.08"/>

  <!-- Bottom-right cluster -->
  <circle cx="840" cy="800" r="2.5" fill="#f5a97f" opacity="0.15"/>
  <circle cx="800" cy="830" r="2" fill="#f5a97f" opacity="0.1"/>
  <line x1="840" y1="800" x2="800" y2="830" stroke="#f5a97f" stroke-width="1" opacity="0.08"/>

  <!-- Main "Y" letterform -->
  <g transform="translate(512, 460)">
    <!-- Y shape built from paths — geometric, modern -->
    <path d="
      M -160,-220
      L -160,-220
      L -60,-40
      L -60,220
      L 60,220
      L 60,-40
      L 160,-220
      L 60,-220
      L 0,-100
      L -60,-220
      Z
    " fill="url(#ygrad)"/>
  </g>

  <!-- Subtle glow behind the Y -->
  <g transform="translate(512, 460)" opacity="0.3" filter="url(#blur)">
    <path d="
      M -160,-220
      L -60,-40
      L -60,220
      L 60,220
      L 60,-40
      L 160,-220
      L 60,-220
      L 0,-100
      L -60,-220
      Z
    " fill="#c6a0f6"/>
  </g>

  <!-- Small decorative pixel accent under Y (retro touch) -->
  <g transform="translate(512, 740)" opacity="0.25">
    <rect x="-40" y="0" width="8" height="8" rx="1" fill="#c6a0f6"/>
    <rect x="-24" y="0" width="8" height="8" rx="1" fill="#b7bdf8"/>
    <rect x="-8" y="0" width="8" height="8" rx="1" fill="#8aadf4"/>
    <rect x="8" y="0" width="8" height="8" rx="1" fill="#b7bdf8"/>
    <rect x="24" y="0" width="8" height="8" rx="1" fill="#c6a0f6"/>
  </g>

  <!-- "YARVIS" text at bottom (very small, subtle) -->
  <text x="512" y="808" text-anchor="middle" font-family="system-ui, sans-serif" font-size="42" font-weight="800" letter-spacing="12" fill="#cad3f5" opacity="0.2">YARVIS</text>
</svg>
